name: Publish Helm Chart (reusable)

on:
  workflow_call:
    inputs:
      chart-path:
        description: Path to the chart directory (e.g. charts/aif-operator)
        required: true
        type: string
      app-version:
        description: Release version for appVersion update
        required: false
        type: string
        default: ''
      update-app-version:
        description: Whether to update Chart.yaml appVersion before packaging
        required: false
        type: boolean
        default: false
      image-name:
        description: Container image name for helm.sh/images annotation (e.g. ghcr.io/suse/aif-operator). Skipped when empty.
        required: false
        type: string
        default: ''
      registry:
        description: OCI registry to push charts to
        required: false
        type: string
        default: oci://ghcr.io/suse/charts

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update appVersion
        if: inputs.update-app-version
        env:
          VERSION: ${{ inputs.app-version }}
          CHART_PATH: ${{ inputs.chart-path }}
        run: |
          yq -i ".appVersion = \"${VERSION}\"" "$CHART_PATH/Chart.yaml"
          echo "Updated appVersion to $VERSION"
          yq '.version, .appVersion' "$CHART_PATH/Chart.yaml"

      - name: Update image annotations
        if: inputs.image-name != '' && inputs.app-version != ''
        env:
          VERSION: ${{ inputs.app-version }}
          CHART_PATH: ${{ inputs.chart-path }}
          IMAGE_NAME: ${{ inputs.image-name }}
        run: |
          yq -i ".annotations.\"helm.sh/images\" = \"- image: ${IMAGE_NAME}:${VERSION}\n  name: ${IMAGE_NAME##*/}\"" "$CHART_PATH/Chart.yaml"
          echo "Updated helm.sh/images annotation"
          yq '.annotations' "$CHART_PATH/Chart.yaml"

      - name: Package chart
        id: package
        env:
          CHART_PATH: ${{ inputs.chart-path }}
        run: |
          chart_package=$(helm package "$CHART_PATH" --destination . | awk '{print $NF}')
          echo "chart_package=$chart_package" >> "$GITHUB_OUTPUT"
          echo "Packaged: $chart_package"

      - name: Push chart
        env:
          REGISTRY: ${{ inputs.registry }}
          CHART_PACKAGE: ${{ steps.package.outputs.chart_package }}
        run: helm push "$CHART_PACKAGE" "$REGISTRY"
