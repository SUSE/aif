name: AI Factory Operator CI

on:
  pull_request:
    paths:
      - 'operator/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum

      - name: Guard Kubernetes version (product supports 1.35 only)
        run: |
          v=$(go list -m -f '{{.Version}}' k8s.io/api)
          minor=$(echo "$v" | sed -E 's/^v0\.([0-9]+)\..*/\1/')
          echo "k8s.io/api = $v (Kubernetes 1.$minor)"
          if [ "$minor" -ge 36 ]; then
            echo "::error::k8s.io/api $v is Kubernetes 1.$minor; product supports 1.35 only — do not cross the 0.36 boundary (see .github/dependabot.yml)."
            exit 1
          fi

      # - name: Lint
      #   uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9
      #   with:
      #     version: v2.12
      #     working-directory: operator

      - name: Build
        run: go build ./...

      - name: Test
        run: make test
