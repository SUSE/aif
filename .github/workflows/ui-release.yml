name: AI Factory UI Extension Release

on:
  push:
    tags: ['aif-ui-v*']

env:
  IMAGE_NAME: ghcr.io/suse/aif-ui
  GH_BRANCH: gh-pages

jobs:
  prepare:
    outputs:
      VERSION: ${{ steps.tags.outputs.VERSION }}
      METADATA_TAGS: ${{ steps.tags.outputs.METADATA_TAGS }}
      PUBLISH_GH_PAGES: ${{ steps.tags.outputs.PUBLISH_GH_PAGES }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Calculate tags
        id: tags
        shell: bash
        env:
          GH_REF: ${{ github.ref }}
        run: |
          VERSION="${GH_REF#refs/tags/aif-ui-v}"

          if [[ "$VERSION" == *"-"* ]]; then
            METADATA_TAGS="$VERSION"
            PUBLISH_GH_PAGES=false
          else
            METADATA_TAGS=$(printf '%s\n%s' "$VERSION" "latest")
            PUBLISH_GH_PAGES=true
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "PUBLISH_GH_PAGES=$PUBLISH_GH_PAGES" >> "$GITHUB_OUTPUT"
          {
            echo "METADATA_TAGS<<EOF"
            echo "$METADATA_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-container:
    needs: prepare
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    name: Build Container (${{ matrix.arch }})
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: ui/ai-factory/.nvmrc
          cache: yarn
          cache-dependency-path: ui/ai-factory/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: ui/ai-factory
        run: yarn install --immutable

      - name: Parse Extension Name
        working-directory: ui/ai-factory
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ai-factory-${{ needs.prepare.outputs.VERSION }}
        run: yarn parse-tag-name "$RELEASE_TAG" "${{ github.run_id }}" "catalog"

      - name: Build and publish per-arch image
        working-directory: ui/ai-factory
        env:
          RELEASE_TAG: ai-factory-${{ needs.prepare.outputs.VERSION }}
        run: yarn publish-pkgs -c -i '' -r ghcr.io -o 'suse' -t "$RELEASE_TAG"

      - name: Tag and push per-arch image
        env:
          VERSION: ${{ needs.prepare.outputs.VERSION }}
          RELEASE_TAG: "ghcr.io/suse/ai-factory"
        run: |
          docker tag "$RELEASE_TAG:$VERSION" "$IMAGE_NAME:$VERSION-${{ matrix.arch }}"
          docker push "$IMAGE_NAME:$VERSION-${{ matrix.arch }}"

  manifest:
    name: Create Multi-Arch Manifest
    needs: [prepare, build-container]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          VERSION: ${{ needs.prepare.outputs.VERSION }}
          METADATA_TAGS: ${{ needs.prepare.outputs.METADATA_TAGS }}
        run: |
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue

            echo "Creating manifest for tag: $tag"

            docker buildx imagetools create \
              -t "$IMAGE_NAME:$tag" \
              "$IMAGE_NAME:$VERSION-amd64" \
              "$IMAGE_NAME:$VERSION-arm64"

          done <<< "$METADATA_TAGS"

  publish-gh-pages:
    name: Publish to GitHub Pages
    needs: prepare
    if: needs.prepare.outputs.PUBLISH_GH_PAGES == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: ui/ai-factory/.nvmrc
          cache: yarn
          cache-dependency-path: ui/ai-factory/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: ui/ai-factory
        run: yarn install --immutable

      - name: Parse Extension Name
        working-directory: ui/ai-factory
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: "ai-factory-${{ needs.prepare.outputs.VERSION }}"
        run: yarn parse-tag-name "$RELEASE_TAG" "${{ github.run_id }}" "charts"

      - name: Build extension assets
        working-directory: ui/ai-factory
        env:
          RELEASE_TAG: "ai-factory-${{ needs.prepare.outputs.VERSION }}"
        run: yarn publish-pkgs -s "${{ github.repository }}" -b "${{ env.GH_BRANCH }}" -t "$RELEASE_TAG" -f

      - name: Upload build artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: gh-pages-assets
          path: ui/ai-factory/tmp

  release-gh:
    name: Commit to gh-pages Branch
    needs: [prepare, publish-gh-pages]
    if: needs.prepare.outputs.PUBLISH_GH_PAGES == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.GH_BRANCH }}

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Download build artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: gh-pages-assets

      - name: Commit and push
        run: |
          git add ./{assets,charts,extensions,index.yaml}
          git commit -a -m "release: aif-ui v${{ needs.prepare.outputs.VERSION }}"
          git push
