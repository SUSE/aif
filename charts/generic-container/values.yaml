image: nginx:latest
replicaCount: 1

service:
  port: 80
  type: ClusterIP

gpu:
  enabled: false
  count: "1"
  type: nvidia.com/gpu

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

livenessProbe: {}
readinessProbe: {}

env: []
ports: []
imagePullSecrets: []
