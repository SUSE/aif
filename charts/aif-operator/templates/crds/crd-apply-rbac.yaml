{{- if .Values.crds.manageWithJob }}
# RBAC for the CRD-apply hook Job. Created as pre-install/pre-upgrade hooks (with a
# lower weight than the Job) and torn down afterwards, so the installer only holds
# CRD-management permissions for the duration of the hook.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aif-operator.fullname" . }}-crd-apply
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aif-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aif-operator.fullname" . }}-crd-apply
  labels:
    {{- include "aif-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
rules:
  # No delete: the Job only applies CRDs so uninstall never removes them (or CRs).
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aif-operator.fullname" . }}-crd-apply
  labels:
    {{- include "aif-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aif-operator.fullname" . }}-crd-apply
subjects:
  - kind: ServiceAccount
    name: {{ include "aif-operator.fullname" . }}-crd-apply
    namespace: {{ .Release.Namespace }}
{{- end }}
