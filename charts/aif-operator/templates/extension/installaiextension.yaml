{{- if .Values.aiExtension.enabled }}
apiVersion: ai-factory.suse.com/v1alpha1
kind: InstallAIExtension
metadata:
  name: {{ .Values.aiExtension.extension.name }}
  labels:
    {{- include "aif-operator.labels" . | nindent 4 }}
spec:
  source:
    kind: {{ .Values.aiExtension.source.kind }}
    {{- if eq .Values.aiExtension.source.kind "Helm" }}
    helm:
      chartURL: {{ .Values.aiExtension.source.helm.chartURL | quote }}
      version: {{ .Values.aiExtension.source.helm.version | quote }}
      {{- with .Values.aiExtension.source.helm.auth }}
      auth:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aiExtension.source.helm.tls }}
      tls:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* Forward the operator-level appCatalog.useStaticCatalog to the aif-ui
             chart as a convenience alias, UNLESS the user set it explicitly under
             aiExtension.source.helm.values. Use a presence check (hasKey), not a
             dict merge: Sprig's merge treats false as an empty value and would let
             the alias clobber an explicit `false`. */}}
      {{- $extra := deepCopy (.Values.aiExtension.source.helm.values | default dict) }}
      {{- $ac := default dict $extra.appCatalog }}
      {{- if not (hasKey $ac "useStaticCatalog") }}
      {{-   $_ := set $ac "useStaticCatalog" .Values.appCatalog.useStaticCatalog }}
      {{-   $_ := set $extra "appCatalog" $ac }}
      {{- end }}
      values:
        {{- toYaml $extra | nindent 8 }}
    {{- end }}
  extension:
    name: {{ .Values.aiExtension.extension.name | quote }}
    version: {{ .Values.aiExtension.extension.version | quote }}
{{- end }}
