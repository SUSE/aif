apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aif-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aif-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aif-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aif-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aif-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: operator
          image: {{ include "aif-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /opt/aif/bin/operator
          args:
            - --log-level={{ .Values.operator.logLevel }}
            - --log-format={{ .Values.operator.logFormat }}
            - --catalog-refresh={{ .Values.operator.catalogRefresh }}
          ports:
            - name: api
              containerPort: {{ .Values.service.ports.api }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.ports.health }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.ports.metrics }}
              protocol: TCP
            - name: webhook
              containerPort: {{ .Values.service.ports.webhook }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- range .Values.extraEmptyDirs }}
            - name: {{ . | replace "/" "-" | trimPrefix "-" }}
              mountPath: {{ . }}
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "aif-operator.fullname" . }}
        {{- end }}
        {{- range .Values.extraEmptyDirs }}
        - name: {{ . | replace "/" "-" | trimPrefix "-" }}
          emptyDir: {}
        {{- end }}
        {{- if .Values.webhook.enabled }}
        - name: webhook-certs
          secret:
            secretName: aif-webhook-tls
            defaultMode: 0440
        {{- end }}
