---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: blueprints.ai-factory.suse.com
spec:
  group: ai-factory.suse.com
  names:
    kind: Blueprint
    listKind: BlueprintList
    plural: blueprints
    shortNames:
    - bp
    singular: blueprint
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: Display Name
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Blueprint is the Schema for the blueprints API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BlueprintSpec defines the desired state of a Blueprint version.
            properties:
              components:
                description: Components are the Helm charts included in this blueprint.
                items:
                  description: BlueprintComponent defines one component in a Blueprint.
                  properties:
                    helm:
                      description: Helm source; required iff type is Helm.
                      properties:
                        chartName:
                          description: ChartName is the Helm chart name.
                          minLength: 1
                          type: string
                        chartRepo:
                          description: ChartRepo is the Rancher ClusterRepo name.
                          minLength: 1
                          type: string
                        chartVersion:
                          description: ChartVersion is the semver chart version.
                          minLength: 1
                          type: string
                      required:
                      - chartName
                      - chartRepo
                      - chartVersion
                      type: object
                    kustomize:
                      description: Kustomize source; required iff type is Kustomize.
                      properties:
                        path:
                          description: Path is the directory containing kustomization.yaml.
                          minLength: 1
                          type: string
                        repo:
                          description: Repo is the git repository URL containing the
                            kustomization.
                          minLength: 1
                          type: string
                        revision:
                          description: Revision is the git branch, tag, or commit.
                            Defaults to the repo default branch.
                          type: string
                      required:
                      - path
                      - repo
                      type: object
                    name:
                      description: Name is the component identity within a blueprint
                        (ordering/reference key).
                      minLength: 1
                      type: string
                    targetNamespace:
                      description: |-
                        TargetNamespace optionally pins this component to a fixed namespace.
                        Must be a valid DNS-1123 label.
                      maxLength: 63
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    type:
                      default: Helm
                      description: Type selects the content source. Defaults to Helm
                        for backward-compatible authoring.
                      enum:
                      - Helm
                      - Kustomize
                      type: string
                    values:
                      description: Values are deploy-time overrides (Helm values).
                      x-kubernetes-preserve-unknown-fields: true
                    vendor:
                      default: suse
                      description: Vendor selects the secret-injection profile. Defaults
                        to "suse".
                      enum:
                      - suse
                      - nvidia
                      type: string
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: helm is required (and kustomize must be absent) when
                      type is Helm
                    rule: 'self.type == ''Helm'' ? has(self.helm) && !has(self.kustomize)
                      : true'
                  - message: kustomize is required (and helm must be absent) when
                      type is Kustomize
                    rule: 'self.type == ''Kustomize'' ? has(self.kustomize) && !has(self.helm)
                      : true'
                minItems: 1
                type: array
              deprecated:
                description: Deprecated marks this blueprint version as deprecated.
                type: boolean
              description:
                description: Description is an optional human-readable description.
                type: string
              displayName:
                description: DisplayName is the human-readable name shared across
                  all versions.
                minLength: 1
                type: string
              source:
                description: |-
                  Source identifies where this blueprint came from (SUSE, Nvidia, or Custom).
                  To leave the source unset, omit the field entirely; the enum does not
                  include the empty string, so setting `source: ""` will fail admission.
                enum:
                - SUSE
                - Nvidia
                - Custom
                type: string
              version:
                description: Version is the semver version string of this blueprint.
                pattern: ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-[a-zA-Z0-9.-]+)?(\+[a-zA-Z0-9.-]+)?$
                type: string
            required:
            - components
            - displayName
            - version
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
