# NOTE: The UI extension reads this ConfigMap from a hardcoded namespace
# (cattle-ui-plugin-system). This chart must be installed into that same
# namespace — see the Prerequisites section in README.md.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aif-ui-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aif-ui.labels" . | nindent 4 }}
data:
  operatorNamespace: {{ .Values.operator.namespace | default "aif-operator" | quote }}
  operatorService:   {{ .Values.operator.service   | default "aif-operator" | quote }}
