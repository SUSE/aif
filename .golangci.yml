version: 2

run:
  timeout: 5m
  tests: false

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - ineffassign
    - unused

issues:
  exclude-files:
    - ".*\\.pb\\.go$"
    - "zz_generated.*\\.go$"
  exclude-dirs:
    - dashboard
    - harvester-ui-extension
    - hack
    - ui
