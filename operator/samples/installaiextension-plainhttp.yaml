# WARNING: This sample demonstrates the plainHTTP feature for development and air-gapped
# environments. Using plainHTTP sends registry credentials in cleartext over HTTP.
# DO NOT use this in production with sensitive credentials.
apiVersion: ai-factory.suse.com/v1alpha1
kind: InstallAIExtension
metadata:
  name: aif-ui
spec:
  source:
    kind: Helm
    helm:
      chartURL: oci://registry.internal.example.com:8088/aif/chart/aif-ui
      version: 2.0.0
      plainHTTP: true            # DANGEROUS: credentials sent in cleartext; dev/air-gap only
      auth:
        basic:
          userSecretRef:  { name: aif-ui-registry, key: username }
          tokenSecretRef: { name: aif-ui-registry, key: password }
  extension:
    name: aif-ui
    version: 2.0.0
