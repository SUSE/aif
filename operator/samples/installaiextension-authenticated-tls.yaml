apiVersion: ai-factory.suse.com/v1alpha1
kind: InstallAIExtension
metadata:
  name: aif-ui
spec:
  source:
    kind: Helm
    helm:
      chartURL: oci://registry.internal.example.com/charts/aif-ui-server
      version: 1.0.0
      auth:
        basic:
          userSecretRef:  { name: aif-ui-registry, key: username }
          tokenSecretRef: { name: aif-ui-registry, key: password }
      tls:
        caSecretRef: { name: aif-ui-registry-ca, key: ca.crt }
        # mutual TLS (optional):
        # clientTLSSecretRef: { name: aif-ui-registry-client }
  extension:
    name: aif-ui
    version: 1.0.0
